---
layout: default
---
<div class="section">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-12">
        {% include heading.html title=page.title description=page.description align="left" %}
      </div>
    </div>
  </div>
</div>

<div class="section pt-0">
  <div class="container">
    <div class="row justify-content-center align-items-start">
      <div class="col-12 col-md-6 mb-4 mb-md-0">
        {% if page.image %}
          <div class="about-image">
            <img src="{{ page.image | relative_url }}" alt="{{ page.title }}" style="max-width:100%;height:auto;display:block;border-radius:4px;" />
          </div>
        {% endif %}
      </div>
      <div class="col-12 col-md-6">
        <div class="content">{{ content }}</div>
      </div>
    </div>
  </div>
</div>
