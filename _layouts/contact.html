---
layout: default
---
<div class="section">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-12">
        {% include heading.html title=page.title align="left" %}
      </div>
    </div>
  </div>
</div>

<div class="section pt-0">
  <div class="container">
    <div class="row justify-content-start">
      <div class="col-12 col-lg-8">
        <div class="content">{{ content }}</div>
      </div>
    </div>
  </div>
</div>

<div class="section pt-0">
  <div class="container">
    <div class="row justify-content-start">
      <div class="col-12 col-lg-8">
        <div class="contact">
          <form name="simple-contact-form" accept-charset="utf-8" action="{{ page.form_action | default: '#' }}" method="POST">
            <div class="form-group">
              <label for="full-name">Name</label>
              <input type="text" name="name" id="full-name" placeholder="Your name..">
            </div>
            <div class="form-group">
              <label for="email-address">Email</label>
              <input type="email" name="_replyto" id="email-address" placeholder="Your email..">
            </div>
            <div class="form-group">
              <label for="message">Message</label>
              <textarea id="message" name="message" placeholder="Write something.." style="height:200px"></textarea>
            </div>
            <input type="hidden" name="_subject" id="email-subject" value="Contact Form Submission">
            <input class="button" type="submit" value="Submit">
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
